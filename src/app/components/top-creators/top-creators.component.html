<section class="top-creators">
  <div class="top-creators__content container">
      <h2 class="section-title">Top creators</h2>
      <p class="section-subtitle top-creators__subtitle">Checkout Top Rated Creators on the NFT MarketplaceComponent</p>
    <ul class="top-creators__list">
      @for (card of CREATOR_CARDS; track card.id) {
        <li><app-creator-card [card]="card"/></li>
      }
    </ul>
    <a class="top-creators__link" href="#">View rankings</a>
  </div>
</section>
