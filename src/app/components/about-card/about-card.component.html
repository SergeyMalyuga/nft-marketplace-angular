<article class="about-card">
  <a class="about-card__link" href="#">
    <img
      class="about-card__image"
      [ngSrc]="card.image.url"
      [width]="card.image.width"
      [height]="card.image.height"
      [alt]="card.image.alt"
      loading="lazy"
      target="_blank"
      rel="noopener noreferrer"
    />
    <div class="about-card__info">
      <h3 class="about-card__title">{{ card.title }}</h3>
      <p class="about-card__description">
        {{ card.description }}
      </p>
    </div>
  </a>
</article>
